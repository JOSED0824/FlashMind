name: flashmind_proyecto
description: "FlashMind - Microlearning en 7 minutos"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_bloc: ^9.0.0
  equatable: ^2.0.7

  # Navigation
  go_router: ^14.6.3

  # Fonts
  google_fonts: ^6.2.1

  # Dependency injection
  get_it: ^8.0.3

  # Local storage (Web-compatible)
  hive_flutter: ^1.1.0

  # Animations
  flutter_animate: ^4.5.0

  # Score ring widget
  percent_indicator: ^4.2.4

  # UUID generation
  uuid: ^4.5.1

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2

  # Google Sign-In
  google_sign_in: ^6.2.2

  # WebSocket & JSON Serialization
  web_socket_channel: ^2.4.0
  json_serializable: ^6.7.0
  provider: ^6.1.5+1
  flutter_local_notifications: ^21.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Hive code generation
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

  # Mocking in tests
  mocktail: ^1.0.4


flutter:
  uses-material-design: true

  assets:
    - assets/data/questions.json

